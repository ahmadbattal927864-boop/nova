<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
        }
        .welcome-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: #DAA520;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5);}
            50% { opacity: 0.8; transform: scale(1);}
        }
        .welcome-card {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 60px 80px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #DAA520;
            box-shadow: 0 0 60px rgba(218, 165, 32, 0.15);
            z-index: 2;
            animation: fadeInUp 1s ease-out;
            max-width: 90%;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .welcome-title {
            font-size: 56px;
            font-weight: 800;
            margin: 20px 0;
            font-family: 'Cairo', sans-serif;
        }
        .welcome-title .gold {
            color: #DAA520;
            text-shadow: 0 0 20px rgba(218, 165, 32, 0.5);
        }
        .welcome-subtitle {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
            background: linear-gradient(135deg, #FFFFFF 0%, #DAA520 50%, #FFD700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: subtleGlow 3s infinite;
        }
        @keyframes subtleGlow {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 5px rgba(218,165,32,0.3);}
            50% { opacity: 1; text-shadow: 0 0 15px rgba(218,165,32,0.6);}
        }
        .gold-line-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #DAA520, #FFD700, #DAA520, transparent);
            margin: 25px auto;
            animation: expandLine 1.5s ease-out;
        }
        @keyframes expandLine {
            from { width: 0; opacity: 0; }
            to { width: 100px; opacity: 1; }
        }
        .btn-welcome {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #DAA520;
            color: #0A0A0A;
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.3s ease;
            margin: 20px 0;
            border: none;
            cursor: pointer;
        }
        .btn-welcome:hover {
            background: #FFD700;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(218, 165, 32, 0.6);
        }
        .features {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 14px;
        }
        .feature span:first-child {
            color: #DAA520;
            font-size: 18px;
        }
        @media (max-width: 768px) {
            .welcome-card {
                padding: 40px 30px;
            }
            .welcome-title {
                font-size: 36px;
            }
            .welcome-subtitle {
                font-size: 18px;
            }
            .btn-welcome {
                padding: 12px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-page">
        <div class="stars" id="stars"></div>
        <div class="welcome-card">
            <h1 class="welcome-title">
                Welcome to <span class="gold">NOVA</span>
            </h1>
            <p class="welcome-subtitle">
                ✨ nova أهلاً بك في عالم  ✨<br>
                حيث التفاصيل تصنع الفرق
            </p>
            <div class="gold-line-divider"></div>
            <a href="shop.html" class="btn-welcome">
                <span>ابدأ رحلتك</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18"/>
                </svg>
            </a>
            <div class="features">
                <div class="feature"><span>✦</span><span>شحن سريع لسوريا</span></div>
                <div class="feature"><span>✦</span><span>تصاميم حصرية</span></div>
                <div class="feature"><span>✦</span><span>دعم 24/7</span></div>
                <div class="feature"><span>✦</span><span>توصيل آمن</span></div>
            </div>
        </div>
    </div>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = Math.random() * 2 + 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
</html>
